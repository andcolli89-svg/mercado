name: Validar e Gerar CbOfertas V5.2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/build-apk.yml'
      - 'README.md'
  pull_request:
    paths:
      - 'android/**'
      - 'backend/**'
      - 'scripts/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validar projeto e aplicação web
        run: |
          node scripts/validate-project.js
          node scripts/smoke-webapp.js

      - name: Verificar backend e testes automatizados
        working-directory: backend
        run: |
          npm run check
          npm test

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar APK
        working-directory: android
        run: gradle clean :app:assembleDebug --no-daemon

      - name: Validar e nomear APK
        run: |
          set -euo pipefail
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK"
          unzip -l "$APK" | grep -q 'assets/www/index.html'
          unzip -l "$APK" | grep -q 'assets/www/app.js'
          unzip -l "$APK" | grep -q 'assets/www/style.css'
          cp "$APK" CbOfertas-V5.2.apk
          sha256sum CbOfertas-V5.2.apk > CbOfertas-V5.2.apk.sha256

      - name: Gerar ZIP completo para GitHub
        run: |
          set -euo pipefail
          zip -qr CbOfertas-V5.2-PROGRAMA-COMPLETO.zip . \
            -x '.git/*' 'android/.gradle/*' 'android/app/build/*' '*.apk' '*.sha256' 'CbOfertas-V5.2-PROGRAMA-COMPLETO.zip'
          sha256sum CbOfertas-V5.2-PROGRAMA-COMPLETO.zip > CbOfertas-V5.2-PROGRAMA-COMPLETO.zip.sha256

      - name: Publicar APK e ZIP
        uses: actions/upload-artifact@v4
        with:
          name: CbOfertas-V5.2-Completa
          path: |
            CbOfertas-V5.2.apk
            CbOfertas-V5.2.apk.sha256
            CbOfertas-V5.2-PROGRAMA-COMPLETO.zip
            CbOfertas-V5.2-PROGRAMA-COMPLETO.zip.sha256
          retention-days: 30
