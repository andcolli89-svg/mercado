name: Gerar APK V16
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['android/**', '.github/workflows/build-apk.yml']
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Compilar APK
        working-directory: android
        run: gradle clean :app:assembleDebug --no-daemon
      - name: Validar APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK"
          unzip -l "$APK" | grep -q 'assets/www/index.html'
          unzip -l "$APK" | grep -q 'assets/www/app.js'
          cp "$APK" PromoZap-MELI-V16.apk
          sha256sum PromoZap-MELI-V16.apk > PromoZap-MELI-V16.apk.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: PromoZap-MELI-V16-APK
          path: |
            PromoZap-MELI-V16.apk
            PromoZap-MELI-V16.apk.sha256
          retention-days: 30
