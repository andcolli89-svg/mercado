name: Gerar APK V15

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: read

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Compilar e validar APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configurar Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Limpar e compilar APK debug
        working-directory: android
        run: gradle clean :app:assembleDebug --no-daemon --stacktrace

      - name: Validar conteúdo do APK
        shell: bash
        run: |
          set -euo pipefail
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$APK"
          unzip -l "$APK" > apk-conteudo.txt
          grep -q 'assets/www/index.html' apk-conteudo.txt
          grep -q 'assets/www/app.js' apk-conteudo.txt
          cp "$APK" PromoZap-MELI-V15-debug.apk
          sha256sum PromoZap-MELI-V15-debug.apk > PromoZap-MELI-V15-debug.apk.sha256
          ls -lh PromoZap-MELI-V15-debug.apk

      - name: Publicar APK e comprovantes
        uses: actions/upload-artifact@v4
        with:
          name: PromoZap-MELI-V15-APK
          path: |
            PromoZap-MELI-V15-debug.apk
            PromoZap-MELI-V15-debug.apk.sha256
            apk-conteudo.txt
          if-no-files-found: error
          retention-days: 30
